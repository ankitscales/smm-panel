<!DOCTYPE html>
<html>
<head>
    <title>SMM Drip-Feed Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63);
            font-family: system-ui, sans-serif;
            padding: 16px;
            color: white;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            border: none;
        }
        input {
            background: rgba(255,255,255,0.2);
            color: white;
            width: 180px;
        }
        button {
            background: #667eea;
            color: white;
            cursor: pointer;
        }
        .campaign {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .progress-bar {
            height: 8px;
            background: #333;
            border-radius: 10px;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: #48bb78;
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s;
        }
        .status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #1a1a3e;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
        }
        .logs {
            font-size: 11px;
            font-family: monospace;
            margin-top: 8px;
            color: #aaa;
        }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-danger { background: #f56565; }
        .btn-warning { background: #ed8936; }
    </style>
</head>
<body>
<div class="status" id="status">🟢 Connecting...</div>

<div class="card">
    <h2>⚡ SMM Drip-Feed Panel</h2>
    <div>💰 Balance: <strong id="balance">---</strong></div>
    <div>🤖 Worker: <strong id="workerStatus">Checking...</strong></div>
</div>

<div class="card">
    <h2>🎯 Create Campaign</h2>
    <div class="flex">
        <div><label>Service ID</label><input type="text" id="serviceId" value="13636"></div>
        <div><label>Video Link</label><input type="text" id="videoLink" value="https://www.instagram.com/p/DXjJeKLzW8_/"></div>
    </div>
    <div class="flex">
        <div><label>Target Views</label><input type="number" id="target" value="4500"></div>
        <div><label>Min Views</label><input type="number" id="minViews" value="100"></div>
        <div><label>Max Views</label><input type="number" id="maxViews" value="200"></div>
        <div><label>Interval (min)</label><input type="number" id="interval" value="2"></div>
    </div>
    <button id="createBtn" style="width:100%; margin-top:10px;">✨ Create Campaign</button>
</div>

<div class="card">
    <h2>📋 Active Campaigns</h2>
    <button id="refreshBtn">🔄 Refresh</button>
    <div id="campaignsList">Loading...</div>
</div>

<script>
const API_URL = window.location.origin;

async function callAPI(endpoint, options = {}) {
    try {
        const res = await fetch(`${API_URL}${endpoint}`, {
            headers: { 'Content-Type': 'application/json' },
            ...options
        });
        return await res.json();
    } catch(e) {
        console.error(e);
        return { success: false };
    }
}

async function loadBalance() {
    const data = await callAPI('/api/balance');
    if (data.success !== false) {
        document.getElementById('balance').innerHTML = `$${data.balance?.toFixed(2) || data.balance || '0'}`;
        document.getElementById('status').innerHTML = '🟢 Server Online';
        document.getElementById('workerStatus').innerHTML = '✅ Running';
    } else {
        document.getElementById('status').innerHTML = '🔴 Server Error';
    }
}

async function loadCampaigns() {
    const data = await callAPI('/api/campaigns');
    const container = document.getElementById('campaignsList');
    if (!data.campaigns || data.campaigns.length === 0) {
        container.innerHTML = '<p>✨ No campaigns. Create one above!</p>';
        return;
    }
    
    let html = '';
    for (let c of data.campaigns) {
        const percent = (c.delivered / c.target) * 100;
        const statusColor = c.status === 'running' ? '#48bb78' : (c.status === 'paused' ? '#ed8936' : '#4299e1');
        const statusText = c.status === 'running' ? '🟢 RUNNING' : (c.status === 'paused' ? '⏸️ PAUSED' : '✅ COMPLETED');
        
        html += `
        <div class="campaign">
            <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
                <strong>Campaign #${c.id}</strong>
                <span style="color:${statusColor}">${statusText}</span>
            </div>
            <div>📊 ${c.delivered}/${c.target} views | 🎲 ${c.min_val}-${c.max_val} | ⏱️ Every ${c.interval}min | 📦 ${c.order_count} orders</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
            <div>
                ${c.status === 'running' ? `<button class="btn-sm btn-warning" onclick="updateStatus(${c.id}, 'paused')">⏸️ Pause</button>` : ''}
                ${c.status === 'paused' ? `<button class="btn-sm" style="background:#48bb78" onclick="updateStatus(${c.id}, 'running')">▶️ Resume</button>` : ''}
                <button class="btn-sm btn-danger" onclick="deleteCampaign(${c.id})">🗑️ Delete</button>
            </div>
            <div class="logs">${c.logs.slice(-5).map(l => `<div>${l}</div>`).join('')}</div>
        </div>`;
    }
    container.innerHTML = html;
}

async function createCampaign() {
    const data = {
        service_id: document.getElementById('serviceId').value,
        link: document.getElementById('videoLink').value,
        target: parseInt(document.getElementById('target').value),
        min_val: parseInt(document.getElementById('minViews').value),
        max_val: parseInt(document.getElementById('maxViews').value),
        interval: parseInt(document.getElementById('interval').value)
    };
    
    const result = await callAPI('/api/campaigns', {
        method: 'POST',
        body: JSON.stringify(data)
    });
    
    if (result.success) {
        alert('Campaign created! It will start in a few seconds.');
        loadCampaigns();
    } else {
        alert('Failed to create campaign');
    }
}

async function updateStatus(id, status) {
    await callAPI(`/api/campaigns/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ status })
    });
    loadCampaigns();
}

async function deleteCampaign(id) {
    if (confirm('Delete this campaign?')) {
        await callAPI(`/api/campaigns/${id}`, { method: 'DELETE' });
        loadCampaigns();
    }
}

// Event listeners
document.getElementById('createBtn').addEventListener('click', createCampaign);
document.getElementById('refreshBtn').addEventListener('click', () => {
    loadBalance();
    loadCampaigns();
});

// Auto-refresh every 3 seconds
loadBalance();
loadCampaigns();
setInterval(() => {
    loadCampaigns();
}, 3000);
setInterval(() => {
    loadBalance();
}, 30000);
</script>
</body>
</html>
